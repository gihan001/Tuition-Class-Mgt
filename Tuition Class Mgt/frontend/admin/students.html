<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Students - Smart Tuition</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
    <link rel="stylesheet" href="../assets/css/forms.css">
</head>
<body>
    
    <div class="dashboard-container">

        <aside class="sidebar">
            <h2>Smart Tuition</h2>
            <ul>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="students.html" class="active">Students</a></li>
                <li><a href="teachers.html">Teachers</a></li>
                <li><a href="classes.html">Classes</a></li>
                <li><a href="../index.html" class="logout-btn">Logout</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <header>
                <button class="toggle-btn" onclick="toggleSidebar(event)">☰ Menu</button>
                <h1>Manage Students</h1>
                <p>View and manage student information</p>
            </header>

            <section class="table-container">
                <div class="table-header">
                    <h2>Student List</h2>
                    
                    <div>
                        <input type="text" id="searchInput" class="search-bar" placeholder="Search students..." onkeyup="searchTable()">
                        <button class="primary-button" onclick="openModal()">Add New Student</button>
                    </div>
                    
                </div>

                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Student ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Grade</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr>
                            <td>STU-001</td>
                            <td>Kamal Perera</td>
                            <td>kamal@email.com</td>
                            <td>Grade 10</td>
                            <td>
                                <button class="action-btn edit-btn">Edit</button>
                                <button class="action-btn delete-btn">Delete</button>
                            </td>
                        </tr>
                        <tr>
                            <td>STU-002</td>
                            <td>Nimali Fernando</td>
                            <td>nimali@email.com</td>
                            <td>Grade 11</td>
                            <td>
                                <button class="action-btn edit-btn">Edit</button>
                                <button class="action-btn delete-btn">Delete</button>
                            </td>
                        </tr>
                    </tbody>

                </table>
            </section>
        </main>
    </div>

    <div id="addModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            
            <h2>Add New Student</h2>
            
            <form>
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter student name">
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" placeholder="Enter email address">
                </div>
                <div class="input-group">
                    <label>Grade</label>
                    <input type="text" placeholder="e.g. Grade 10">
                </div>
                <button type="button" class="primary-button submit-btn">Save Student</button>
            </form>
        </div>
    </div>

    <script src="../assets/js/dashboard.js"></script>
</body>
</html>
